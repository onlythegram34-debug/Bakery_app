{% extends "base.html" %}
{% block content %}
<h2>Collect Payment for Order #{{ order.id }}</h2>
<p>Expected amount: <strong>R{{ "%.2f"|format(order.total_amount) }}</strong></p>
<form method="POST">
    <div class="mb-3">
        <label for="amount_received" class="form-label">Amount Received (R)</label>
        <input type="number" step="0.01" name="amount_received" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success">Confirm Payment</button>
    <a href="{{ url_for('delivery.dashboard') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
