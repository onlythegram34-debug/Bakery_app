{% extends "base.html" %}
{% block content %}
<h2>All Users</h2>
<table class="table table-striped">
    <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th></tr></thead>
    <tbody>
    {% for u in users %}
    <tr>
        <td>{{ u.name }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.role }}</td>
        <td>{{ u.status }}</td>
        <td><a href="{{ url_for('admin.deactivate_user', user_id=u.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Deactivate this user?')">Deactivate</a></td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
