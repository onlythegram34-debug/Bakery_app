{% extends "base.html" %}
{% block content %}
<h3>All Users</h3>
<table class="table">
    <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th></tr></thead>
    <tbody>
    {% for u in users %}
    <tr>
        <td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ u.status }}</td>
        <td><a href="{{ url_for('admin.deactivate_user', user_id=u.id) }}" class="btn btn-sm btn-danger">Deactivate</a></td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
